<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Web Đọc Truyện</title>
    <link rel="stylesheet" href="../../public/css/log.css">
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">

            <h1 class="form-title">Đăng ký</h1>

                <table>
                    <tr>
                        <td>
                            <label for="ten_dang_nhap">
                                Tên đăng nhập <span class="required-mark">*</span>
                            </label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="text" 
                                   id="ten_dang_nhap" 
                                   name="ten_dang_nhap" 
                                   required
                                   placeholder="Nhập tên đăng nhập">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="email">
                                Email <span class="required-mark">*</span>
                            </label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="email" 
                                   id="email" 
                                   name="email" 
                                   required
                                   placeholder="example@email.com">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="mat_khau">
                                Mật khẩu <span class="required-mark">*</span>
                            </label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="password" 
                                   id="mat_khau" 
                                   name="mat_khau" 
                                   required
                                   minlength="6"
                                   placeholder="Tối thiểu 6 ký tự">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="mat_khau_confirm">
                                Xác nhận mật khẩu <span class="required-mark">*</span>
                            </label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="password" 
                                   id="mat_khau_confirm" 
                                   name="mat_khau_confirm" 
                                   required
                                   minlength="6"
                                   placeholder="Nhập lại mật khẩu">
                        </td>
                    </tr>
                </table>

                <div class="form-actions">
                    <button type="submit" id="signup">Đăng ký</button>
                </div>
                
                <p class="form-footer-link">
                    Đã có tài khoản? 
                    <a href="/web_doc_truyen/frontend/view/log/login.html">
                        Đăng nhập ngay
                    </a>
                </p>
        </div>
    </div>
    <script>
        const registerForm = document.querySelector('.user-form');
        const username = document.getElementById('ten_dang_nhap');
        const email = document.getElementById('email');
        const password = document.getElementById('mat_khau');
        const btnsignup = document.getElementById('signup');
        const confirmPassword = document.getElementById('mat_khau_confirm');

        btnsignup.addEventListener('click', function(event) {
            event.preventDefault();

            if (password.value !== confirmPassword.value) {
                alert('Mật khẩu xác nhận không khớp');
                return;
            }

            const payload = {
                ten_dang_nhap: username.value,
                email: email.value,
                mat_khau: password.value,
                mat_khau_confirm: confirmPassword.value
            };

            fetch('/web_doc_truyen/backend/api/log/register_api.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(async (response) => {
                const data = await response.json();
                return { ok: response.ok, data };
            })
            .then(({ ok, data }) => {
                if (ok && data.success) {
                    alert(data.message || 'Đăng ký thành công');
                    window.location.href = '/web_doc_truyen/frontend/view/log/login.html';
                    return;
                }

                if (Array.isArray(data.errors) && data.errors.length > 0) {
                    alert(data.errors.join('\n'));
                    return;
                }

                alert(data.message || 'Đăng ký thất bại');
            })
            .catch((error) => {
                console.error('Error:', error);
                alert('Đã xảy ra lỗi. Vui lòng thử lại sau.');
            });
        });
    </script>
</body>
</html>
