<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm Trang</title>
    <link rel="stylesheet" href="../../public/css/admin.css">
    <link rel="stylesheet" href="../../public/css/trang.css">
</head>
<body>

<a href="../../index.php?page=admin&controller=trang&action=index" class="btn-home">
    ← Quay lại
</a>

<h1 class="form-title">Thêm Trang Mới</h1>

<div class="user-form">
    <form id="formTrang" enctype="multipart/form-data">
        <table>
            <tr>
                <td>Chương: <span class="required">*</span></td>
                <td>
                    <select name="id_chuong" id="id_chuong" required>
                        <option value="">-- Chọn chương --</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Trang số: <span class="required">*</span></td>
                <td>
                    <input type="number" name="so_trang" min="1" placeholder="VD: 1" required>
                </td>
            </tr>
            <tr>
                <td>Loại: <span class="required">*</span></td>
                <td>
                    <select name="loai" required>
                        <option value="image">Ảnh</option>
                        <option value="text">Văn bản</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Nội dung:</td>
                <td>
                    <textarea name="noi_dung" rows="6" placeholder="Nhập nội dung trang..."></textarea>
                </td>
            </tr>
            <tr>
                <td>Ảnh:</td>
                <td>
                    <input type="file" name="anh" accept="image/*">
                </td>
            </tr>
        </table>

        <div class="form-actions">
            <button type="submit">Thêm trang</button>
            <a href="../../index.php?page=admin&controller=trang&action=index" class="btn-back">Hủy</a>
        </div>
    </form>
</div>

<div id="api-message" style="text-align:center;margin-top:10px;"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const form   = document.getElementById('formTrang');
    const msgBox = document.getElementById('api-message');
    const selectChuong = document.getElementById('id_chuong');

    // Lấy id_chuong từ URL nếu có
    const urlParams = new URLSearchParams(window.location.search);
    const idChuongFromUrl = urlParams.get('id_chuong');

    // Load danh sách chương
    async function loadChuong() {
        try {
            const res  = await fetch('../../../backend/api/chuong/get_all_chuong_api.php');
            const data = await res.json();

            if (data.success && Array.isArray(data.chuongs)) {
                data.chuongs.forEach(function (c) {
                    const opt = document.createElement('option');
                    opt.value       = c.id;
                    opt.textContent = 'Chương ' + c.so_chuong + ' - ' + (c.tieu_de || '');
                    // Tự chọn nếu URL có id_chuong
                    if (idChuongFromUrl && String(c.id) === String(idChuongFromUrl)) {
                        opt.selected = true;
                    }
                    selectChuong.appendChild(opt);
                });
            }
        } catch (err) {
            console.error('Lỗi tải chương:', err);
        }
    }

    loadChuong();

    // Submit form
    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        msgBox.textContent = '';
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;

        const formData = new FormData(form);

        try {
            const res  = await fetch('../../../backend/api/trang/add_trang_api.php', {
                method: 'POST',
                body: formData
            });

            const data = await res.json();

            if (res.ok && data.success) {
                msgBox.style.color  = 'green';
                msgBox.textContent  = data.message || 'Thêm trang thành công';

                setTimeout(function () {
                    window.location.href = '../../index.php?page=admin&controller=trang&action=index';
                }, 800);

            } else {
                msgBox.style.color = 'red';
                msgBox.textContent = data.message || 'Thêm thất bại';
            }

        } catch (err) {
            msgBox.style.color = 'red';
            msgBox.textContent = 'Lỗi: ' + err.message;
        } finally {
            btn.disabled = false;
        }
    });

});
</script>

</body>
</html>
