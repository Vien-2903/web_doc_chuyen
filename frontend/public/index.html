<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Đọc Truyện</title>
    <link rel="stylesheet" href="/web_doc_truyen/frontend/public/css/theloai_user.css">
    <link rel="stylesheet" href="/web_doc_truyen/frontend/public/css/home.css?v=20260403-1">
    <link rel="stylesheet" href="/web_doc_truyen/frontend/public/css/yeuthich.css">
    <link rel="stylesheet" href="../public/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <section class="stories">
        <div class="container">
            <h2>Danh Sách Truyện</h2>
            <div class="story-grid" id="story-grid">
                <div class="story-status">Đang tải danh sách truyện...</div>
            </div>
            </div>
    </section>

    <script>
        const headerContainer = document.getElementById('header-container');
        const storyGrid = document.getElementById('story-grid');
        
        async function loadHeader() {
            try {
                const response = await fetch('/web_doc_truyen/frontend/view/layouts/user/header.html', {
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    throw new Error('Không tải được header.html');
                }

                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const header = doc.querySelector('header');
                const scripts = doc.querySelectorAll('script');

                if (!header) {
                    throw new Error('Không tìm thấy thẻ header trong header.html');
                }

                headerContainer.innerHTML = header.outerHTML;

                scripts.forEach((script) => {
                    const runtimeScript = document.createElement('script');

                    if (script.src) {
                        runtimeScript.src = script.src;
                    } else {
                        runtimeScript.textContent = script.textContent;
                    }

                    document.body.appendChild(runtimeScript);
                });
            } catch (error) {
                console.error('Lỗi tải header:', error);
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatViewCount(value) {
            return Number(value || 0).toLocaleString('vi-VN');
        }

        function resolveCoverUrl(anhBia) {
            if (!anhBia) {
                return 'https://via.placeholder.com/180x240/2c3e50/ffffff?text=No+Image';
            }

            let normalized = String(anhBia).trim().replace(/\\/g, '/');

            if (normalized.startsWith('http://') || normalized.startsWith('https://') || normalized.startsWith('/')) {
                if (!normalized.startsWith('/web_doc_truyen/')) {
                    return normalized;
                }
                normalized = normalized.replace(/^\/web_doc_truyen\//, '');
            }

            if (normalized.startsWith('web_doc_truyen/')) {
                normalized = normalized.replace(/^web_doc_truyen\//, '');
            }

            const legacyPrefixes = [
                'uploads/anhbia/',
                'frontend/public/uploads/anhbia/',
                'frontend/images/anhbia/',
                'images/anhbia/',
                'backend/uploads/anhbia/'
            ];

            for (const prefix of legacyPrefixes) {
                if (normalized.startsWith(prefix)) {
                    const parts = normalized.split('/').filter(Boolean);
                    const fileName = parts[parts.length - 1] || '';
                    if (fileName) {
                        return '/web_doc_truyen/backend/uploads/anhbia/' + fileName;
                    }
                }
            }

            if (normalized.startsWith('backend/') || normalized.startsWith('frontend/')) {
                return '/web_doc_truyen/' + normalized;
            }

            return '/web_doc_truyen/' + normalized;
        }

        const favoriteStoryIds = new Set();

        function getLoggedInUser() {
            try {
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch (error) {
                return null;
            }
        }

        async function loadFavoriteIds() {
            const user = getLoggedInUser();
            if (!user || !user.id) {
                return;
            }

            favoriteStoryIds.clear();

            try {
                const response = await fetch('/web_doc_truyen/backend/api/yeuthich/get_by_user.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id_nguoidung: user.id })
                });

                const data = await response.json();
                if (response.ok && data.success && Array.isArray(data.data)) {
                    data.data.forEach((item) => {
                        const idValue = Number(item.id || item.id_truyen || 0);
                        if (idValue) {
                            favoriteStoryIds.add(idValue);
                        }
                    });
                    localStorage.setItem('favoriteStoryIds', JSON.stringify(Array.from(favoriteStoryIds)));
                }
            } catch (error) {
                console.warn('Không tải được danh sách yêu thích:', error);
            }
        }

        function updateHeartButton(button, isLiked) {
            button.classList.toggle('liked', isLiked);
            button.classList.toggle('not-liked', !isLiked);
            button.title = isLiked ? 'Bỏ yêu thích' : 'Thêm vào yêu thích';
            button.setAttribute('aria-label', isLiked ? 'Đã yêu thích' : 'Thêm vào yêu thích');
        }

        function bindHeartCards() {
            document.querySelectorAll('.heart-card-overlay').forEach((button) => {
                button.addEventListener('click', async (event) => {
                    event.preventDefault();
                    event.stopPropagation();

                    const storyId = Number(button.dataset.storyId || 0);
                    const user = getLoggedInUser();
                    if (!user || !user.id) {
                        window.alert('Bạn cần đăng nhập để thích truyện.');
                        return;
                    }

                    button.disabled = true;

                    try {
                        const response = await fetch('/web_doc_truyen/backend/api/yeuthich/toggle.php', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                id_nguoidung: user.id,
                                id_truyen: storyId
                            })
                        });

                        const data = await response.json();
                        if (response.ok && data.success) {
                            const nowLiked = Boolean(data.is_liked);
                            
                            // Cập nhật favoriteStoryIds từ danh sách FAVORITES mới từ backend
                            favoriteStoryIds.clear();
                            if (Array.isArray(data.favorites)) {
                                data.favorites.forEach((item) => {
                                    const id = Number(item.id || item.id_truyen || 0);
                                    if (id) favoriteStoryIds.add(id);
                                });
                            }
                            localStorage.setItem('favoriteStoryIds', JSON.stringify(Array.from(favoriteStoryIds)));
                            localStorage.setItem('favoriteListUpdatedAt', String(Date.now()));

                            // Cập nhật button
                            updateHeartButton(button, nowLiked);
                            
                            // Gửi sự kiện cho trang danh sách yêu thích (nếu đang mở) để nó cập nhật
                            window.dispatchEvent(new CustomEvent('favoritesUpdated', {
                                detail: {
                                    action: data.action,
                                    storyId: storyId,
                                    favorites: data.favorites,
                                    message: data.message
                                }
                            }));
                        } else {
                            console.warn('Không thể cập nhật yêu thích:', data.message || response.statusText);
                            window.alert(data.message || 'Lỗi khi thay đổi trạng thái yêu thích.');
                        }
                    } catch (error) {
                        console.error('Lỗi khi toggle yêu thích:', error);
                        window.alert('Lỗi mạng khi thay đổi yêu thích.');
                    } finally {
                        button.disabled = false;
                    }
                });
            });
        }

        function addHeartCardOverlays() {
            document.querySelectorAll('.story-card').forEach((card) => {
                const storyId = card.dataset.storyId || 0;
                if (!storyId) return;

                const isLiked = favoriteStoryIds.has(Number(storyId));
                const buttonClasses = isLiked ? 'heart-card-overlay liked' : 'heart-card-overlay not-liked';

                const heartBtn = document.createElement('button');
                heartBtn.type = 'button';
                heartBtn.className = buttonClasses;
                heartBtn.dataset.storyId = storyId;
                heartBtn.setAttribute('aria-label', isLiked ? 'Đã yêu thích' : 'Thêm vào yêu thích');
                heartBtn.innerHTML = '<i class="fa-solid fa-heart"></i>';
                heartBtn.title = isLiked ? 'Bỏ yêu thích' : 'Thêm vào yêu thích';

                card.appendChild(heartBtn);
            });

            bindHeartCards();
        }

        function renderStories(stories) {
            if (!Array.isArray(stories) || stories.length === 0) {
                storyGrid.innerHTML = '<div class="story-status"><h3>Chưa có truyện nào</h3><p>Vui lòng quay lại sau</p></div>';
                return;
            }

            storyGrid.innerHTML = stories.map((story) => {
                const title = escapeHtml(story.ten_truyen || 'Không có tiêu đề');
                const author = escapeHtml(story.tac_gia || 'Chưa rõ');
                const cover = resolveCoverUrl(story.anh_bia);
                const legacyCover = '';

                return `
                    <article class="story-card" data-story-id="${story.id}">
                        <a href="/web_doc_truyen/frontend/public/index.php?page=chitiet&id=${story.id}">
                            <img src="${cover}" alt="${title}" data-legacy-src="${escapeHtml(legacyCover)}" onerror="if(this.dataset.legacySrc && this.src !== this.dataset.legacySrc){this.src=this.dataset.legacySrc;this.dataset.legacySrc='';return;}this.src='https://via.placeholder.com/180x240/2c3e50/ffffff?text=No+Image'">
                            <h3>${title}</h3>
                            <p>Tác giả: ${author}</p>
                            <div class="story-meta">
                                <span>
                                    <i class="fa-solid fa-eye"></i>
                                    ${formatViewCount(story.luot_xem)}</span>
                            </div>
                        </a>
                    </article>
                `;
            }).join('');

            addHeartCardOverlays();
        }

        async function loadStories() {
            try {
                await loadFavoriteIds();
                const response = await fetch('/web_doc_truyen/backend/api/truyen/truyen_api.php');
                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'Không thể tải dữ liệu truyện');
                }

                renderStories(data.stories || []);
            } catch (error) {
                console.error('Lỗi tải danh sách truyện:', error);
                storyGrid.innerHTML = '<div class="story-status"><h3>⚠ Không tải được dữ liệu</h3><p>Vui lòng thử lại sau.</p></div>';
            }
        }

        loadHeader();
        loadStories();
    </script>
</body>
</html>
